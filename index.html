<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASDF — 공식 홈페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" data-page="home">
        <span class="logo-icon">◆</span>
        <span class="logo-text">ASDF</span>
      </a>
      <nav class="main-nav">
        <a href="#" data-page="home">홈</a>
        <a href="#" data-page="board" data-board="user_board">유저 게시판</a>
        <a href="#" data-page="board" data-board="dev_notes">개발자 노트</a>
        <a href="#" data-page="board" data-board="world_lore">세계관</a>
        <a href="#" data-page="board" data-board="update_news">업데이트</a>
        <a href="#" data-page="mailbox" id="nav-mailbox">우편함 <span id="mail-badge" class="badge">0</span></a>
        <a href="#" data-page="approvals" id="nav-approvals" class="staff-only">결재</a>
        <a href="#" data-page="announce" id="nav-announce" class="staff-only">공지 작성</a>
      </nav>
      <div class="auth-area">
        <div id="auth-section" class="auth-forms">
          <div class="auth-group">
            <input type="text" id="login-id" placeholder="ID" class="input input-sm">
            <input type="password" id="login-password" placeholder="비밀번호" class="input input-sm">
            <button id="btn-login" class="btn btn-primary btn-sm">로그인</button>
          </div>
          <div class="auth-group">
            <input type="text" id="register-nickname" placeholder="닉네임" class="input input-sm">
            <input type="password" id="register-password" placeholder="비밀번호" class="input input-sm">
            <button id="btn-register" class="btn btn-outline btn-sm">회원가입</button>
          </div>
        </div>
        <div id="user-info" class="user-info" style="display:none">
          <div class="user-details">
            <span id="user-name" class="user-name"></span>
            <span id="user-role" class="user-role"></span>
          </div>
          <button id="btn-logout" class="btn btn-outline btn-sm">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content"></main>

  <footer class="site-footer">
    <p>&copy; 2026 ASDF Game. All rights reserved.</p>
    <p class="footer-note">운영진 계정은 ID_0 형식으로 접속 (예: Manager_Omega_0)</p>
  </footer>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-confirm" class="btn btn-primary">확인</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- GPT API 설정 (챗봇용) -->
  <script src="js/gpt-config.js"></script>

  <!-- 챗봇 위젯 -->
  <div id="chatbot-widget" class="chatbot-widget">
    <div id="chatbot-panel" class="chatbot-panel" hidden>
      <div class="chatbot-header">
        <div class="chatbot-header-info">
          <div class="chatbot-avatar" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </div>
          <div>
            <strong>ASDF 가이드</strong>
            <span class="chatbot-sub">GPT 게임 도우미</span>
          </div>
        </div>
        <div class="chatbot-header-actions">
          <button id="chatbot-settings" class="chatbot-settings-btn" type="button" title="API 키 설정">⚙</button>
          <button id="chatbot-close" class="chatbot-close" aria-label="닫기">&times;</button>
        </div>
      </div>
      <div id="chatbot-key-setup" class="chatbot-key-setup" hidden>
        <p>OpenAI API 키를 입력하세요 <small>(브라우저에만 저장)</small></p>
        <input type="password" id="chatbot-api-key" class="chatbot-input" placeholder="sk-proj-...">
        <button type="button" id="chatbot-save-key" class="btn btn-primary btn-sm">키 저장</button>
      </div>
      <div id="chatbot-messages" class="chatbot-messages">
        <div class="chatbot-msg bot">
          <p>안녕하세요! ASDF 게임 공식 가이드입니다. 세계관, 게시판, 업데이트 등 무엇이든 물어보세요.</p>
        </div>
      </div>
      <form id="chatbot-form" class="chatbot-form">
        <input type="text" id="chatbot-input" class="chatbot-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <button type="submit" id="chatbot-send" class="chatbot-send" aria-label="전송">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </div>
    <button id="chatbot-toggle" class="chatbot-fab" type="button" aria-label="ASDF 가이드 챗봇 열기">
      <span class="chatbot-fab-pulse" aria-hidden="true"></span>
      <svg class="chatbot-fab-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        <circle cx="8" cy="10" r="1.5"/>
        <circle cx="12" cy="10" r="1.5"/>
        <circle cx="16" cy="10" r="1.5"/>
      </svg>
    </button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/mailbox.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/board.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
