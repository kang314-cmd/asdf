<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASDF — 공식 홈페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" data-page="home">
        <span class="logo-icon">◆</span>
        <span class="logo-text">ASDF</span>
      </a>
      <nav class="main-nav">
        <a href="#" data-page="home">홈</a>
        <a href="#" data-page="board" data-board="user_board">유저 게시판</a>
        <a href="#" data-page="board" data-board="dev_notes">개발자 노트</a>
        <a href="#" data-page="board" data-board="world_lore">세계관</a>
        <a href="#" data-page="board" data-board="update_news">업데이트</a>
        <a href="#" data-page="mailbox" id="nav-mailbox">우편함 <span id="mail-badge" class="badge">0</span></a>
        <a href="#" data-page="approvals" id="nav-approvals" class="staff-only">결재</a>
        <a href="#" data-page="announce" id="nav-announce" class="staff-only">공지 작성</a>
      </nav>
      <div class="auth-area">
        <div id="auth-section" class="auth-forms">
          <div class="auth-group">
            <input type="text" id="login-id" placeholder="ID" class="input input-sm">
            <input type="password" id="login-password" placeholder="비밀번호" class="input input-sm">
            <button id="btn-login" class="btn btn-primary btn-sm">로그인</button>
          </div>
          <div class="auth-group">
            <input type="text" id="register-nickname" placeholder="닉네임" class="input input-sm">
            <input type="password" id="register-password" placeholder="비밀번호" class="input input-sm">
            <button id="btn-register" class="btn btn-outline btn-sm">회원가입</button>
          </div>
        </div>
        <div id="user-info" class="user-info" style="display:none">
          <div class="user-details">
            <span id="user-name" class="user-name"></span>
            <span id="user-role" class="user-role"></span>
          </div>
          <button id="btn-logout" class="btn btn-outline btn-sm">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content"></main>

  <footer class="site-footer">
    <p>&copy; 2026 ASDF Game. All rights reserved.</p>
    <p class="footer-note">운영진 계정은 ID_0 형식으로 접속 (예: Manager_Omega_0)</p>
  </footer>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-confirm" class="btn btn-primary">확인</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/mailbox.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/board.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
